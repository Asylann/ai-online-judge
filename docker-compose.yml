# ============================================================
# AI Online Judge — Polyglot Monorepo Production Orchestration
# ============================================================
#
# Target Architecture: Prof. Yutaka Watanobe's Laboratory (University of Aizu)
# Demonstrates:
#   - Asynchronous Choreography via RabbitMQ AMQP message broker
#   - Educational Data Mining (EDM) effort metrics tracking
#   - Observer & Launcher/Executor sandbox isolation boundaries
#   - Socratic Virtual TA (OpenAI GPT-4o + gotreesitter AST parsing)
#   - Content-Based Recommendation System (CBRS) inside student ZPD
#
# Usage:
#   Start all services:  docker-compose up --build -d
#   View all logs:       docker-compose logs -f
#   Stop cluster:        docker-compose down -v
# ============================================================

services:

  # ── PostgreSQL — Primary Persistent Store (EDM Schema) ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ai_judge_postgres
    environment:
      POSTGRES_DB:       aionlinejudge
      POSTGRES_USER:     judge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge -d aionlinejudge"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Redis — Cache, Rate Limiting & WebSocket Pub/Sub Backbone ───────────────
  redis:
    image: redis:7-alpine
    container_name: ai_judge_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── RabbitMQ — AMQP Message Broker (ACK/NACK Delivery Guarantees) ───────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai_judge_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: judge
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol port
      - "15672:15672"  # Management UI (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Jaeger — Distributed Tracing Backbone (OTLP HTTP Receiver) ──────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ai_judge_jaeger
    ports:
      - "16686:16686" # Jaeger Web UI (http://localhost:16686)
      - "4318:4318"   # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Prometheus — Time-Series Metrics Scraping Engine ────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ai_judge_prometheus
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Grafana — Operational Metrics Dashboards & SLO Monitoring ───────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ai_judge_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000" # Mapped 3001 host -> 3000 container (avoids Next.js port 3000)
    depends_on:
      - prometheus
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Go API Gateway — Central REST Routing & JWT Auth Engine ─────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ai_judge_api_gateway
    environment:
      PORT:          "8080"
      DATABASE_URL:  postgres://judge:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aionlinejudge?sslmode=disable
      RABBITMQ_URL:  amqp://judge:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      JWT_SECRET:    ${JWT_SECRET:-supersecretjwtkeyforonlinejudgedev}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-jaeger:4318}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Go Judge Worker — AMQP Consumer & Judge0 Sandbox Bridge ─────────────────
  judge-worker:
    build:
      context: .
      dockerfile: judge-worker/Dockerfile
    container_name: ai_judge_worker
    environment:
      DATABASE_URL:    postgres://judge:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aionlinejudge?sslmode=disable
      RABBITMQ_URL:    amqp://judge:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL:       redis:6379
      JUDGE0_URL:      ${JUDGE0_URL:-https://ce.judge0.com}
      AST_SERVICE_URL: http://ast-service:8083
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-jaeger:4318}
    ports:
      - "8081:8081" # Prometheus metrics scraping endpoint
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ast-service:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Go AST Service — gotreesitter Complexity Scoring & Structural Analysis ──
  ast-service:
    build:
      context: .
      dockerfile: ast-service/Dockerfile
    container_name: ai_judge_ast_service
    environment:
      PORT:         "8083"
      DATABASE_URL: postgres://judge:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aionlinejudge?sslmode=disable
      AI_TUTOR_URL: http://ai-tutor:8000
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-jaeger:4318}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      ai-tutor:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Python AI Tutor — Virtual TA (FastAPI + OpenAI GPT-4o RAG Pipeline) ─────
  ai-tutor:
    build:
      context: ./ai-tutor
      dockerfile: Dockerfile
    container_name: ai_judge_ai_tutor
    environment:
      PORT:           "8000"
      DATABASE_URL:   postgresql://judge:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aionlinejudge
      REDIS_URL:      redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder-for-testing}
      OPENAI_MODEL:   ${OPENAI_MODEL:-gpt-4o}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Go WebSocket Service — Real-Time Pub/Sub Push Hub ───────────────────────
  websocket-service:
    build:
      context: .
      dockerfile: websocket-service/Dockerfile
    container_name: ai_judge_websocket_service
    environment:
      PORT:       "8082"
      REDIS_URL:  redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkeyforonlinejudgedev}
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-judge-network
    restart: unless-stopped

  # ── Next.js Frontend — Anthropic Minimalist UI & Monaco Editor ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_judge_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL:  ws://localhost:8082
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
      - websocket-service
    networks:
      - ai-judge-network
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  ai-judge-network:
    driver: bridge
