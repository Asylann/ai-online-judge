global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'judge-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['judge-worker:8081']

  - job_name: 'websocket-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['websocket-service:8082']
