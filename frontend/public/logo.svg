<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer Neural Ring / Shield -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagonal Crest Background -->
  <path d="M50 4 L88 26 V74 L50 96 L12 74 V26 Z" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="3" filter="url(#glow)" />
  <path d="M50 9 L83 28 V72 L50 91 L17 72 V28 Z" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.6" />

  <!-- Orbital AI Sparkle Nodes -->
  <circle cx="50" cy="18" r="3" fill="url(#emeraldGrad)" />
  <circle cx="22" cy="65" r="2.5" fill="url(#goldGrad)" />
  <circle cx="78" cy="65" r="2.5" fill="url(#goldGrad)" />
  <path d="M50 18 L22 65 M50 18 L78 65" stroke="url(#emeraldGrad)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />

  <!-- Code Brackets Left (<) -->
  <path d="M35 38 L22 50 L35 62" stroke="url(#emeraldGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Code Brackets Right (>) -->
  <path d="M65 38 L78 50 L65 62" stroke="url(#emeraldGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Central Judge Gavel & AI Diamond -->
  <path d="M42 32 L60 50" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" />
  <path d="M36 44 L48 32" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
  <!-- Gavel Base / Block -->
  <path d="M36 68 L64 68" stroke="#e2e8f0" stroke-width="4.5" stroke-linecap="round" />
  <!-- AI Sparkle Crown right above the gavel -->
  <path d="M68 28 L71 34 L77 37 L71 40 L68 46 L65 40 L59 37 L65 34 Z" fill="url(#goldGrad)" />
</svg>
