<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="infLoopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="centerStarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <!-- Continuous Möbius / Infinity Loop without any background square or box -->
  <path d="M140 256 C140 156 215 156 256 256 C297 356 372 356 372 256 C372 156 297 156 256 256 C215 356 140 356 140 256 Z" stroke="url(#infLoopGrad)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Left Code Bracket < (Coding) -->
  <path d="M125 210 L75 256 L125 302" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="75" cy="256" r="6" fill="#fbbf24"/>

  <!-- Right Code Bracket > (Coding & Testing) -->
  <path d="M387 210 L437 256 L387 302" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="437" cy="256" r="6" fill="#34d399"/>

  <!-- Glowing Central AI Socratic Star right in the center -->
  <path d="M256 200 C256 242 235 256 194 256 C235 256 256 270 256 312 C256 270 277 256 318 256 C277 256 256 242 256 200 Z" fill="url(#centerStarGrad)"/>
  <circle cx="256" cy="256" r="7" fill="#ffffff"/>
</svg>
