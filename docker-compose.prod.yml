name: ai-online-judge-prod

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ai_judge_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - api-gateway
      - websocket-service
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 20M

  postgres:
    image: postgres:15-alpine
    container_name: ai_judge_postgres
    environment:
      POSTGRES_DB: aionlinejudge
      POSTGRES_USER: judge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    command: ["postgres", "-c", "shared_buffers=32MB", "-c", "max_connections=30"]
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./deployments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge -d aionlinejudge"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 100M

  redis:
    image: redis:7-alpine
    container_name: ai_judge_redis
    command: redis-server --maxmemory 20mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 30M

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: ai_judge_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: judge
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 120M

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ai_judge_api_gateway
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://judge:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aionlinejudge?sslmode=disable
      RABBITMQ_URL: amqp://judge:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkeyforonlinejudgedev}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 30M

  judge-worker:
    build:
      context: .
      dockerfile: judge-worker/Dockerfile
    container_name: ai_judge_worker
    environment:
      DATABASE_URL: postgres://judge:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aionlinejudge?sslmode=disable
      RABBITMQ_URL: amqp://judge:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis:6379
      JUDGE0_URL: ${JUDGE0_URL:-https://ce.judge0.com}
      AST_SERVICE_URL: http://ast-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 50M

  ast-service:
    build:
      context: .
      dockerfile: ast-service/Dockerfile
    container_name: ai_judge_ast_service
    environment:
      PORT: "8083"
      DATABASE_URL: postgres://judge:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aionlinejudge?sslmode=disable
      AI_TUTOR_URL: http://ai-tutor:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 30M

  ai-tutor:
    build:
      context: ./ai-tutor
      dockerfile: Dockerfile
    container_name: ai_judge_ai_tutor
    environment:
      PORT: "8000"
      DATABASE_URL: postgresql://judge:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aionlinejudge
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder-for-testing}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 150M

  websocket-service:
    build:
      context: .
      dockerfile: websocket-service/Dockerfile
    container_name: ai_judge_websocket_service
    environment:
      PORT: "8082"
      REDIS_URL: redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkeyforonlinejudgedev}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 20M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_WS_URL: /ws
    container_name: ai_judge_frontend
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_WS_URL: /ws
    depends_on:
      - api-gateway
      - websocket-service
    networks:
      - ai-judge-network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 200M

networks:
  ai-judge-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:
